name: Build Dev Binaries (Myself)

# -------------------------------------------------------
# オリジナル build-dev-binaries.yml からの変更点：
#   1. on: workflow_call → workflow_dispatch に変更
#      （他のワークフローから呼ばれる形式 → 手動実行ボタンで起動）
#   2. Astral社カスタムランナーをGitHub標準ランナーに置き換え
#      github-ubuntu-24.04-x86_64-8 → ubuntu-24.04
#      github-ubuntu-24.04-aarch64-4 → ubuntu-24.04 + クロスコンパイル
#      macos-latest-large            → macos-13（Intel Mac標準ランナー）
#   3. save-rust-cache input は削除（常にキャッシュ保存する）
#   4. timeout-minutes をカスタムランナーより遅い分、余裕を持たせた
# -------------------------------------------------------
on:
  workflow_dispatch:

permissions: {}

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

